name: Start tests and deploy

on:
  push:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ secrets.DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: ${{ secrets.DB_NAME }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

          # Запускаем Kafka и Zookeeper через Docker Compose
      - name: Start Kafka and Zookeeper
        run: |
          cat <<EOF > docker-compose-kafka.yml
          version: '3.8'
          services:
            zookeeper:
              image: confluentinc/cp-zookeeper:7.2.2
              ports:
                - "2181:2181"
              environment:
                ZOOKEEPER_CLIENT_PORT: 2181
                ZOOKEEPER_TICK_TIME: 2000
              healthcheck:
                test: ["CMD", "sh", "-c", "[ -f /tmp/zookeeper-ready ] || (echo stat | nc 127.0.0.1 2181 > /dev/null && touch /tmp/zookeeper-ready)"]
                interval: 5s
                timeout: 5s
                retries: 30
                start_period: 30s

            kafka:
              image: confluentinc/cp-kafka:7.2.2
              depends_on:
                zookeeper:
                  condition: service_healthy
              ports:
                - "29092:29092"
                - "9092:9092"
              environment:
                KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
                KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
                KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
                KAFKA_BROKER_ID: 1
                KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          EOF

          # Запускаем сервисы без healthcheck
          docker compose -f docker-compose-kafka.yml up -d --wait zookeeper

          # Явно ждем готовности Zookeeper
          timeout 60 bash -c 'until (echo stat | nc 127.0.0.1 2181); do sleep 2; done'

          # Запускаем Kafka
          docker compose -f docker-compose-kafka.yml up -d --wait kafka

          # Проверяем статус
          docker compose -f docker-compose-kafka.yml ps

      # Основной шаг загрузки переменных
      - name: Load .env file
        uses: falti/dotenv-action@v1
        with:
          env-file: .env
          override: true

      # Проверка загруженных переменных (опционально)
      - name: Debug env variables
        run: |
          echo "DB_USER: ${{ secrets.DB_USER }}"
          echo "DB_NAME: ${{ secrets.DB_NAME }}"
          echo "KAFKA_TOPIC: ${{ secrets.KAFKA_TOPIC_NAME }}"

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install requirements
        run: |
          pip install -r requirements.txt
          pip install psycopg2-binary redis kafka-python

      - name: Wait for services
        run: sleep 60

      - name: Run tests
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DB_USER: ${{ vars.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ vars.DB_NAME }}
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          KAFKA_TOPIC_NAME: ${{ vars.KAFKA_TOPIC_NAME }}
          MODE: TEST
        run: pytest

  build:
    name: Build with Docker Compose
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Load .env for build
        uses: falti/dotenv-action@v2
        with:
          env-file: .env
          override: true

      - name: Docker compose build
        run: |
          docker compose -f docker-compose.yml build
          docker compose -f docker-compose.yml up -d --wait